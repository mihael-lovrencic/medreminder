<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="logo">💊</div>
            <h1>MedReminder</h1>
            <p class="tagline">Track medicines for your patients</p>
            <div class="login-form">
                <input type="text" id="userName" placeholder="Your name" data-i18n-placeholder="enterName">
                <button onclick="createUser()" data-i18n="continueBtn">Continue</button>
            </div>
            <button class="btn-google" onclick="initGoogleSync()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span data-i18n="signInGoogle">Sign in with Google</span>
            </button>
            <button class="btn-text" onclick="startDemoMode()" data-i18n="tryDemo">Try Demo Mode</button>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="hidden">
            <header class="app-header">
                <div class="header-left">
                    <select id="patientSelector" onchange="onPatientChange(event)"></select>
                </div>
                <button class="icon-btn" onclick="showSettings()">⚙️</button>
            </header>

            <main class="app-content">
                <!-- Today's Tab -->
                <div id="todayView">
                    <div class="section">
                        <h3 data-i18n="todaySchedule">Today's Schedule</h3>
                        <div id="todayList" class="medicine-list"></div>
                    </div>
                    <div id="stockWarning" class="stock-alert hidden">
                        <span class="alert-icon">⚠️</span>
                        <div id="lowStockList"></div>
                    </div>
                </div>

                <!-- All Medicines Tab -->
                <div id="allView" class="hidden">
                    <div class="section">
                        <h3 data-i18n="allMedicines">All Medicines</h3>
                        <div id="allList" class="medicine-list"></div>
                    </div>
                </div>

                <!-- Patients Tab -->
                <div id="patientsView" class="hidden">
                    <div class="section">
                        <div class="section-header">
                            <h3 data-i18n="allPatients">Patients</h3>
                            <button class="btn-sm" onclick="showPatientModal()" data-i18n="addPatient">+ Add</button>
                        </div>
                        <div id="patientList" class="patient-grid"></div>
                    </div>
                </div>

                <!-- Add Medicine (FAB) -->
                <button class="fab" onclick="toggleAddMedicine()">+</button>

                <!-- Add Medicine Panel -->
                <div id="addMedicinePanel" class="slide-panel hidden">
                    <div class="panel-header">
                        <h3 data-i18n="addMedicine">Add Medicine</h3>
                        <button class="icon-btn" onclick="toggleAddMedicine()">✕</button>
                    </div>
                    <div class="form-group">
                        <label data-i18n="medicineName">Medicine Name</label>
                        <input type="text" id="medName" placeholder="Search or enter medicine" data-i18n-placeholder="searchMedicine" autocomplete="off">
                        <div id="medicineDropdown" class="dropdown hidden"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="dosage">Dosage</label>
                            <input type="text" id="medDosage" placeholder="e.g., 500mg" data-i18n-placeholder="dosagePlaceholder">
                        </div>
                        <div class="form-group">
                            <label data-i18n="time">Time</label>
                            <input type="time" id="medTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="notes">Notes</label>
                        <input type="text" id="medNotes" placeholder="Optional notes" data-i18n-placeholder="notesPlaceholder">
                    </div>
                    <div class="form-group">
                        <label data-i18n="stockQuantity">Stock (pills)</label>
                        <input type="number" id="medStock" placeholder="30" min="0">
                    </div>
                    <button onclick="addMedicine()" data-i18n="addMedicine">Add Medicine</button>
                </div>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" onclick="showView('today')">
                    <span class="nav-icon">📋</span>
                    <span data-i18n="today">Today</span>
                </button>
                <button class="nav-item" onclick="showView('medicines')">
                    <span class="nav-icon">💊</span>
                    <span data-i18n="allMedicines">Medicines</span>
                </button>
                <button class="nav-item" onclick="showView('patients')">
                    <span class="nav-icon">👥</span>
                    <span data-i18n="allPatients">Patients</span>
                </button>
            </nav>
        </div>

        <!-- Modals -->
        <div id="patientModal" class="modal hidden">
            <div class="modal-content">
                <h2 id="patientModalTitle" data-i18n="addPatient">Add Patient</h2>
                <div class="form-group">
                    <label data-i18n="patientName">Patient Name</label>
                    <input type="text" id="patientName" placeholder="e.g., John Doe" data-i18n-placeholder="patientNamePlaceholder">
                </div>
                <div class="form-group">
                    <label data-i18n="roomNumber">Room</label>
                    <input type="text" id="patientRoom" placeholder="e.g., Room 101" data-i18n-placeholder="roomPlaceholder">
                </div>
                <div class="modal-actions">
                    <button id="savePatientBtn" onclick="addPatient()" data-i18n="savePatient">Save</button>
                    <button id="deletePatientBtn" class="btn-danger hidden" onclick="deletePatient()" data-i18n="deletePatient">Delete</button>
                    <button class="btn-text" onclick="closePatientModal()" data-i18n="cancel">Cancel</button>
                </div>
            </div>
        </div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 data-i18n="settings">Settings</h2>
                    <button class="icon-btn" onclick="closeSettings()">✕</button>
                </div>
                
                <div class="settings-group">
                    <label data-i18n="language">Language</label>
                    <select id="langSelector" onchange="onLangChange(event)">
                        <option value="en">English</option>
                        <option value="de">Deutsch</option>
                        <option value="hr">Hrvatski</option>
                        <option value="hu">Magyar</option>
                        <option value="sl">Slovenščina</option>
                        <option value="it">Italiano</option>
                        <option value="fr">Français</option>
                        <option value="es">Español</option>
                        <option value="pl">Polski</option>
                        <option value="cs">Čeština</option>
                        <option value="sk">Slovenčina</option>
                        <option value="ro">Română</option>
                        <option value="sr">Сpscки</option>
                        <option value="nl">Nederlands</option>
                        <option value="sv">Svenska</option>
                        <option value="fi">Suomi</option>
                        <option value="da">Dansk</option>
                        <option value="no">Norsk</option>
                        <option value="pt">Português</option>
                        <option value="el">Ελληνικά</option>
                    </select>
                </div>

                <div class="settings-group">
                    <h3 data-i18n="team">Team</h3>
                    <div id="orgSection">
                        <div id="orgInfo" class="org-card hidden">
                            <div class="org-name" id="orgNameDisplay"></div>
                            <div class="org-code">
                                <span data-i18n="orgCode">Code:</span>
                                <span id="orgCodeDisplay"></span>
                                <button class="btn-sm" onclick="copyOrgCode()" data-i18n="copy">Copy</button>
                            </div>
                            <div class="org-stats">
                                <span id="orgMemberCount"></span>
                                <span id="orgBackupCount"></span>
                            </div>
                        </div>
                        <button id="createOrgBtn" onclick="showCreateOrgModal()" data-i18n="createOrganization">+ Create Organization</button>
                        <button id="joinOrgBtn" class="hidden" onclick="showJoinOrgModal()" data-i18n="joinOrganization">Join Organization</button>
                        <button id="leaveOrgBtn" class="btn-danger hidden" onclick="leaveOrganization()" data-i18n="leaveOrganization">Leave</button>
                        
                        <div id="orgBackupSection" class="hidden">
                            <button class="btn-primary" onclick="shareBackupToOrg()" data-i18n="shareBackupOrg">Share Backup</button>
                            <button class="btn-secondary" onclick="loadBackupFromOrg()" data-i18n="loadBackupOrg">Load Backup</button>
                            <div id="orgBackupList"></div>
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <h3 data-i18n="backup">Backup</h3>
                    <button id="googleSignInBtn" class="btn-google" onclick="initGoogleSync()">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        <span data-i18n="connectGoogle">Connect Google Drive</span>
                    </button>
                    <button id="syncToDriveBtn" class="btn-primary hidden" onclick="syncToDrive()" data-i18n="uploadDrive">Upload</button>
                    <button id="syncFromDriveBtn" class="btn-secondary hidden" onclick="syncFromDrive()" data-i18n="downloadDrive">Download</button>
                    <button id="googleSignOutBtn" class="btn-danger hidden" onclick="signOutGoogle()" data-i18n="disconnectGoogle">Disconnect</button>
                </div>

                <button class="btn-danger" onclick="switchUser()" data-i18n="switchUser">Switch User</button>
            </div>
        </div>

        <div id="orgModal" class="modal hidden">
            <div class="modal-content">
                <h2 id="orgModalTitle" data-i18n="createOrganization">Create Organization</h2>
                <div class="form-group">
                    <label data-i18n="orgName">Organization Name</label>
                    <input type="text" id="orgNameInput" placeholder="e.g., City Hospital" data-i18n-placeholder="orgNamePlaceholder">
                </div>
                <div class="modal-actions">
                    <button id="saveOrgBtn" onclick="saveOrganization()" data-i18n="create">Create</button>
                    <button class="btn-text" onclick="closeOrgModal()" data-i18n="cancel">Cancel</button>
                </div>
            </div>
        </div>

        <div id="joinOrgModal" class="modal hidden">
            <div class="modal-content">
                <h2 data-i18n="joinOrganization">Join Organization</h2>
                <div class="form-group">
                    <label data-i18n="orgCode">Organization Code</label>
                    <input type="text" id="orgCodeInput" placeholder="Enter code" data-i18n-placeholder="orgCodePlaceholder">
                </div>
                <div class="modal-actions">
                    <button onclick="joinOrganization()" data-i18n="join">Join</button>
                    <button class="btn-text" onclick="closeJoinOrgModal()" data-i18n="cancel">Cancel</button>
                </div>
            </div>
        </div>

        <div id="syncStatus" class="toast hidden"></div>
    </div>

    <script src="js/i18n.js"></script>
    <script>
        initI18n().then(() => applyTranslations());
    </script>
    <script src="js/app.js"></script>
</body>
</html>
