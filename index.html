<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="login-card">
                <div class="login-logo">
                    <i class="fas fa-pills"></i>
                </div>
                <h1 data-i18n="appName">MedReminder</h1>
                <p data-i18n="appTagline">Track medicines for your patients</p>
                <div class="login-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="userName" placeholder="Your name" data-i18n-placeholder="enterName">
                    </div>
                    <button class="btn-primary" onclick="createUser()" data-i18n="continueBtn">
                        <i class="fas fa-arrow-right"></i> Continue
                    </button>
                </div>
                <div class="login-divider">
                    <span>or</span>
                </div>
                <button class="btn-google" onclick="initGoogleSync()">
                    <i class="fab fa-google"></i> Sign in with Google
                </button>
                <button class="btn-ghost" onclick="startDemoMode()" data-i18n="tryDemo">
                    <i class="fas fa-play"></i> Try Demo Mode
                </button>
            </div>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="hidden">
            <header class="app-header">
                <div class="header-left">
                    <select id="patientSelector" onchange="onPatientChange(event)"></select>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="showSettings()" title="Settings">
                        <i class="fas fa-gear"></i>
                    </button>
                </div>
            </header>

            <main class="app-content">
                <!-- Today's View -->
                <div id="todayView">
                    <div class="time-greeting">
                        <i class="fas fa-calendar-day"></i>
                        <span data-i18n="todaySchedule">Today's Schedule</span>
                    </div>
                    <div id="todayList" class="medicine-list"></div>
                    
                    <div id="stockWarning" class="stock-alert hidden">
                        <div class="alert-header">
                            <i class="fas fa-triangle-exclamation"></i>
                            <span data-i18n="lowStockAlert">Low Stock Alert</span>
                        </div>
                        <div id="lowStockList"></div>
                    </div>
                </div>

                <!-- All Medicines View -->
                <div id="allView" class="hidden">
                    <div class="time-greeting">
                        <i class="fas fa-capsules"></i>
                        <span data-i18n="allMedicines">Medicines</span>
                    </div>
                    <div id="allList" class="medicine-list"></div>
                </div>

                <!-- Patients View -->
                <div id="patientsView" class="hidden">
                    <div class="section-header">
                        <div class="time-greeting">
                            <i class="fas fa-users"></i>
                            <span data-i18n="allPatients">Patients</span>
                        </div>
                        <button class="btn-icon" onclick="showPatientModal()" title="Add Patient">
                            <i class="fas fa-user-plus"></i>
                        </button>
                    </div>
                    <div id="patientList" class="patient-grid"></div>
                </div>

                <!-- FAB -->
                <button class="fab" onclick="toggleAddMedicine()" title="Add Medicine">
                    <i class="fas fa-plus"></i>
                </button>

                <!-- Add Medicine Panel -->
                <div id="addMedicinePanel" class="slide-panel hidden">
                    <div class="panel-header">
                        <h3 data-i18n="addMedicine"><i class="fas fa-capsules"></i> Add Medicine</h3>
                        <button class="icon-btn" onclick="toggleAddMedicine()">
                            <i class="fas fa-xmark"></i>
                        </button>
                    </div>
                    <div class="form-group">
                        <label data-i18n="medicineName"><i class="fas fa-pills"></i> Medicine Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="medName" placeholder="Search or enter medicine" data-i18n-placeholder="searchMedicine" autocomplete="off">
                            <div id="medicineDropdown" class="dropdown hidden"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="dosage"><i class="fas fa-prescription-bottle"></i> Dosage</label>
                            <input type="text" id="medDosage" placeholder="e.g., 500mg" data-i18n-placeholder="dosagePlaceholder">
                        </div>
                        <div class="form-group">
                            <label data-i18n="time"><i class="fas fa-clock"></i> Time</label>
                            <input type="time" id="medTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="notes"><i class="fas fa-note-sticky"></i> Notes</label>
                        <input type="text" id="medNotes" placeholder="Optional notes" data-i18n-placeholder="notesPlaceholder">
                    </div>
                    <div class="form-group">
                        <label data-i18n="stockQuantity"><i class="fas fa-box"></i> Stock (pills)</label>
                        <input type="number" id="medStock" placeholder="30" min="0" data-i18n-placeholder="stockPlaceholder">
                    </div>
                    <button class="btn-primary" onclick="addMedicine()">
                        <i class="fas fa-plus"></i> <span data-i18n="addMedicine">Add Medicine</span>
                    </button>
                    <button class="btn-ghost" onclick="toggleAddMedicine()" data-i18n="cancel">Cancel</button>
                </div>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" onclick="showView('today')">
                    <i class="fas fa-calendar-day"></i>
                    <span data-i18n="today">Today</span>
                </button>
                <button class="nav-item" onclick="showView('medicines')">
                    <i class="fas fa-capsules"></i>
                    <span data-i18n="allMedicines">Medicines</span>
                </button>
                <button class="nav-item" onclick="showView('patients')">
                    <i class="fas fa-users"></i>
                    <span data-i18n="allPatients">Patients</span>
                </button>
            </nav>
        </div>

        <!-- Patient Modal -->
        <div id="patientModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-user"></i> <span id="patientModalTitle" data-i18n="addPatient">Add Patient</span></h2>
                    <button class="icon-btn" onclick="closePatientModal()">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div class="form-group">
                    <label data-i18n="patientName"><i class="fas fa-user"></i> Patient Name</label>
                    <input type="text" id="patientName" placeholder="e.g., John Doe" data-i18n-placeholder="patientNamePlaceholder">
                </div>
                <div class="form-group">
                    <label data-i18n="roomNumber"><i class="fas fa-door-open"></i> Room</label>
                    <input type="text" id="patientRoom" placeholder="e.g., Room 101" data-i18n-placeholder="roomPlaceholder">
                </div>
                <div class="modal-actions">
                    <button class="btn-primary" id="savePatientBtn" onclick="addPatient()">
                        <i class="fas fa-check"></i> <span data-i18n="savePatient">Save</span>
                    </button>
                    <button class="btn-danger hidden" id="deletePatientBtn" onclick="deletePatient()">
                        <i class="fas fa-trash"></i> <span data-i18n="deletePatient">Delete</span>
                    </button>
                    <button class="btn-ghost" onclick="closePatientModal()" data-i18n="cancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-gear"></i> <span data-i18n="settings">Settings</span></h2>
                    <button class="icon-btn" onclick="closeSettings()">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                
                <div class="settings-section">
                    <h3><i class="fas fa-globe"></i> <span data-i18n="language">Language</span></h3>
                    <div class="input-wrapper">
                        <select id="langSelector" onchange="onLangChange(event)">
                            <option value="en">🇬🇧 English</option>
                            <option value="de">🇩🇪 Deutsch</option>
                            <option value="hr">🇭🇷 Hrvatski</option>
                            <option value="hu">🇭🇺 Magyar</option>
                            <option value="sl">🇸🇮 Slovenščina</option>
                            <option value="it">🇮🇹 Italiano</option>
                            <option value="fr">🇫🇷 Français</option>
                            <option value="es">🇪🇸 Español</option>
                            <option value="pl">🇵🇱 Polski</option>
                            <option value="cs">🇨🇿 Čeština</option>
                            <option value="sk">🇸🇰 Slovenčina</option>
                            <option value="ro">🇷🇴 Română</option>
                            <option value="sr">🇷🇸 Сpscки</option>
                            <option value="nl">🇳🇱 Nederlands</option>
                            <option value="sv">🇸🇪 Svenska</option>
                            <option value="fi">🇫🇮 Suomi</option>
                            <option value="da">🇩🇰 Dansk</option>
                            <option value="no">🇳🇴 Norsk</option>
                            <option value="pt">🇵🇹 Português</option>
                            <option value="el">🇬🇷 Ελληνικά</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3><i class="fas fa-hospital"></i> <span data-i18n="team">Team</span></h3>
                    <div id="orgSection">
                        <div id="orgInfo" class="org-card hidden">
                            <div class="org-header">
                                <i class="fas fa-hospital"></i>
                                <span id="orgNameDisplay"></span>
                            </div>
                            <div class="org-code">
                                <span data-i18n="orgCode">Code:</span>
                                <code id="orgCodeDisplay"></code>
                                <button class="btn-icon-sm" onclick="copyOrgCode()" title="Copy">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>
                            <div class="org-stats">
                                <span><i class="fas fa-users"></i> <span id="orgMemberCount"></span></span>
                                <span><i class="fas fa-cloud-arrow-up"></i> <span id="orgBackupCount"></span></span>
                            </div>
                        </div>
                        <button class="btn-secondary" id="createOrgBtn" onclick="showCreateOrgModal()">
                            <i class="fas fa-plus"></i> <span data-i18n="createOrganization">Create Organization</span>
                        </button>
                        <button class="btn-ghost hidden" id="joinOrgBtn" onclick="showJoinOrgModal()">
                            <i class="fas fa-right-to-bracket"></i> <span data-i18n="joinOrganization">Join Organization</span>
                        </button>
                        <button class="btn-danger-ghost hidden" id="leaveOrgBtn" onclick="leaveOrganization()">
                            <i class="fas fa-right-from-bracket"></i> <span data-i18n="leaveOrganization">Leave</span>
                        </button>
                        
                        <div id="orgBackupSection" class="hidden backup-actions">
                            <button class="btn-primary" onclick="shareBackupToOrg()">
                                <i class="fas fa-cloud-arrow-up"></i> <span data-i18n="shareBackupOrg">Share Backup</span>
                            </button>
                            <button class="btn-secondary" onclick="loadBackupFromOrg()">
                                <i class="fas fa-cloud-arrow-down"></i> <span data-i18n="loadBackupOrg">Load Backup</span>
                            </button>
                            <div id="orgBackupList"></div>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3><i class="fas fa-cloud-arrow-up"></i> <span data-i18n="backup">Backup</span></h3>
                    <button class="btn-google" id="googleSignInBtn" onclick="initGoogleSync()">
                        <i class="fab fa-google"></i> <span data-i18n="connectGoogle">Connect Google Drive</span>
                    </button>
                    <button class="btn-primary hidden" id="syncToDriveBtn" onclick="syncToDrive()">
                        <i class="fas fa-cloud-arrow-up"></i> <span data-i18n="uploadDrive">Upload</span>
                    </button>
                    <button class="btn-secondary hidden" id="syncFromDriveBtn" onclick="syncFromDrive()">
                        <i class="fas fa-cloud-arrow-down"></i> <span data-i18n="downloadDrive">Download</span>
                    </button>
                    <button class="btn-danger-ghost hidden" id="googleSignOutBtn" onclick="signOutGoogle()">
                        <i class="fas fa-right-from-bracket"></i> <span data-i18n="disconnectGoogle">Disconnect</span>
                    </button>
                </div>

                <button class="btn-danger" onclick="switchUser()">
                    <i class="fas fa-right-from-bracket"></i> <span data-i18n="switchUser">Switch User</span>
                </button>
            </div>
        </div>

        <!-- Org Modal -->
        <div id="orgModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-hospital"></i> <span data-i18n="createOrganization">Create Organization</span></h2>
                    <button class="icon-btn" onclick="closeOrgModal()">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div class="form-group">
                    <label data-i18n="orgName"><i class="fas fa-hospital"></i> Organization Name</label>
                    <input type="text" id="orgNameInput" placeholder="e.g., City Hospital" data-i18n-placeholder="orgNamePlaceholder">
                </div>
                <div class="modal-actions">
                    <button class="btn-primary" id="saveOrgBtn" onclick="saveOrganization()">
                        <i class="fas fa-check"></i> <span data-i18n="create">Create</span>
                    </button>
                    <button class="btn-ghost" onclick="closeOrgModal()" data-i18n="cancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Join Org Modal -->
        <div id="joinOrgModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-right-to-bracket"></i> <span data-i18n="joinOrganization">Join Organization</span></h2>
                    <button class="icon-btn" onclick="closeJoinOrgModal()">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div class="form-group">
                    <label data-i18n="orgCode"><i class="fas fa-key"></i> Organization Code</label>
                    <input type="text" id="orgCodeInput" placeholder="Enter code" data-i18n-placeholder="orgCodePlaceholder">
                </div>
                <div class="modal-actions">
                    <button class="btn-primary" onclick="joinOrganization()">
                        <i class="fas fa-right-to-bracket"></i> <span data-i18n="join">Join</span>
                    </button>
                    <button class="btn-ghost" onclick="closeJoinOrgModal()" data-i18n="cancel">Cancel</button>
                </div>
            </div>
        </div>

        <div id="syncStatus" class="toast hidden"></div>
    </div>

    <script src="js/i18n.js"></script>
    <script>
        initI18n().then(() => applyTranslations());
    </script>
    <script src="js/app.js"></script>
</body>
</html>
